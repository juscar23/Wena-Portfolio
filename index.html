<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira Voss — Photo Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="masthead">
    <div class="brand">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <circle cx="18" cy="18" r="16" stroke="#E8A87C" stroke-width="1.4"/>
        <g stroke="#F5EFE6" stroke-width="1.1">
          <line x1="18" y1="6" x2="18" y2="12"/>
          <line x1="18" y1="24" x2="18" y2="30"/>
          <line x1="6" y1="18" x2="12" y2="18"/>
          <line x1="24" y1="18" x2="30" y2="18"/>
          <line x1="9.5" y1="9.5" x2="13.5" y2="13.5"/>
          <line x1="22.5" y1="22.5" x2="26.5" y2="26.5"/>
          <line x1="26.5" y1="9.5" x2="22.5" y2="13.5"/>
          <line x1="13.5" y1="22.5" x2="9.5" y2="26.5"/>
        </g>
        <circle cx="18" cy="18" r="4.5" fill="#8FBFA6"/>
      </svg>
      <!-- ✏️ EDIT ME: your name and tagline -->
      <div class="brand-text">
        <div class="name">Wena's Portfolio</div>
        <div class="role">Photo Journal · Vol. 01</div>
      </div>
    </div>
    <div class="masthead-right">
      <span class="count">Frame <strong id="curNum">01</strong> / <span id="totNum">10</span></span>
      <span class="sep">·</span>
      <button class="icon-btn" id="playToggle" aria-pressed="true" aria-label="Pause slideshow">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
      </button>
    </div>
  </header>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <img class="frame-img active" id="imgA" alt="">
      <img class="frame-img" id="imgB" alt="">

      <button class="nav-arrow prev" id="prevBtn" aria-label="Previous photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="nav-arrow next" id="nextBtn" aria-label="Next photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>

      <button class="fav-btn" id="favBtn" aria-pressed="false" aria-label="Save this photo to favorites">
        <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M12 20s-7-4.35-9.5-9C.7 6.6 3 3 6.5 3 9 3 11 5 12 6.5 13 5 15 3 17.5 3 21 3 23.3 6.6 21.5 11 19 15.65 12 20 12 20z"/></svg>
      </button>
    </div>

    <div class="caption-bar" aria-live="polite">
      <div class="caption-left">
        <span class="frame-tag" id="frameTag">FR. 01</span>
        <span class="cap-title" id="capTitle">First Light, Dolomites</span>
      </div>
      <div class="cap-loc" id="capLoc">Dolomites, Italy <span class="dot">●</span> 2024</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="filmstrip">
    <div class="sprockets"></div>
    <div class="thumb-track" id="thumbTrack"></div>
    <div class="sprockets"></div>
  </div>

  <div class="hint">USE <kbd>←</kbd> <kbd>→</kbd> TO BROWSE &nbsp;·&nbsp; <kbd>SPACE</kbd> TO PLAY / PAUSE &nbsp;·&nbsp; TAP A FRAME BELOW</div>

</div>

<script src="js/main.js"></script>
</body>
</html>
